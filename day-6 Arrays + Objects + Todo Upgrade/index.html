<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Todo UI</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 to-purple-200 flex justify-center items-center min-h-screen">

  <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-xl">

    <!-- Title -->
    <h1 class="text-2xl font-bold text-center mb-4">
      📝 Todo App
    </h1>

    <!-- Input Section -->
    <div class="flex gap-2">
      <input 
        id="taskInput" 
        type="text" 
        placeholder="Enter your task..."
        class="flex-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
      />

      <button onclick="addTask()"
        class="bg-blue-500 text-white px-4 rounded-lg hover:bg-blue-600">
        Add
      </button>
    </div>

    <!-- Action Buttons -->
    <div class="flex justify-between mt-3 text-sm">
      <button onclick="clearAll()" class="text-red-500 hover:underline">
        Clear All
      </button>
    </div>

    <!-- Task List -->
    <ul id="taskList" class="mt-4 space-y-2"></ul>

  </div>

  <script src="script.js"></script>
</body>
</html>
