<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Day 07 - Todo LocalStorage</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 to-purple-200 flex justify-center items-center min-h-screen">

  <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-xl">

    <h1 class="text-2xl font-bold text-center mb-4">
      📝 Todo App (Saved)
    </h1>

    <!-- Input -->
    <div class="flex gap-2">
      <input 
        id="taskInput" 
        type="text" 
        placeholder="Enter task..."
        class="flex-1 p-2 border rounded-lg"
      />

      <button onclick="addTask()" class="bg-blue-500 text-white px-4 rounded-lg">
        Add
      </button>
    </div>

    <!-- Clear -->
    <div class="flex justify-end mt-2">
      <button onclick="clearAll()" class="text-red-500 text-sm">
        Clear All
      </button>
    </div>

    <!-- List -->
    <ul id="taskList" class="mt-4 space-y-2"></ul>

  </div>

  <script src="script.js"></script>
</body>
</html>
