<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Day 03 - DOM & Events</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-6 rounded-2xl shadow-lg w-96 space-y-6">

    <!-- Counter -->
    <div class="text-center">
      <h2 class="text-lg font-bold">Counter</h2>
      <p id="count" class="text-3xl font-bold my-2">0</p>

      <div class="flex gap-2 justify-center">
        <button id="decrease" class="bg-red-500 text-white px-4 py-2 rounded">-</button>
        <button id="increase" class="bg-green-500 text-white px-4 py-2 rounded">+</button>
      </div>
    </div>

    <!-- Todo -->
    <div>
      <h2 class="text-lg font-bold mb-2">Todo List</h2>

      <input 
        type="text" 
        id="todoInput" 
        placeholder="Enter task"
        class="w-full p-2 border rounded mb-2"
      />

      <button 
        id="addTodo"
        class="w-full bg-blue-500 text-white p-2 rounded"
      >
        Add Task
      </button>

      <ul id="todoList" class="mt-3 list-disc pl-5"></ul>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
