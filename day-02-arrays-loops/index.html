<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Day 02 - Arrays & Loops</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-6 rounded-2xl shadow-lg w-96">
    
    <h1 class="text-xl font-bold text-center mb-4">
      Number List Manager
    </h1>

    <input 
      type="number" 
      id="numberInput" 
      placeholder="Enter number"
      class="w-full mb-3 p-2 border rounded-lg"
    />

    <button 
      onclick="addNumber()" 
      class="w-full bg-blue-500 text-white p-2 rounded-lg hover:bg-blue-600"
    >
      Add Number
    </button>

    <div class="mt-4">
      <h2 class="font-semibold">Numbers:</h2>
      <p id="numbersList" class="text-gray-700"></p>
    </div>

    <div class="mt-2">
      <h2 class="font-semibold">Total:</h2>
      <p id="total" class="text-lg font-bold">0</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
